<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>직업별 패시브 스킬 정리</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f13;
    --bg2:      #16161d;
    --bg3:      #1e1e28;
    --border:   rgba(255,255,255,0.07);
    --border2:  rgba(255,255,255,0.12);
    --text:     #e8e6f0;
    --text2:    #9d9ab0;
    --text3:    #5c596e;
    --accent:   #7b6ef6;
    --accent2:  #a89cf7;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    padding: 0 0 60px;
  }

  /* Header */
  .header {
    padding: 48px 24px 32px;
    text-align: center;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(123,110,246,0.08) 0%, transparent 100%);
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -60px; left: 50%; transform: translateX(-50%);
    width: 400px; height: 200px;
    background: radial-gradient(ellipse, rgba(123,110,246,0.15) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 10px;
  }
  .header h1 {
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .header-sub {
    margin-top: 10px;
    font-size: 14px;
    color: var(--text2);
  }

  /* Container */
  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px 0;
  }

  /* Filter chips */
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
    align-items: center;
  }
  .filter-label {
    font-size: 11px;
    color: var(--text3);
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-right: 4px;
  }
  .chip {
    padding: 5px 14px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--bg2);
    color: var(--text2);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
  }
  .chip:hover { border-color: var(--accent); color: var(--text); }
  .chip.active {
    background: rgba(123,110,246,0.15);
    border-color: var(--accent);
    color: var(--accent2);
  }

  /* Stats */
  .stats-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .stat-item { font-size: 12px; color: var(--text3); }
  .stat-item strong { color: var(--accent2); font-weight: 600; }

  /* Table wrapper */
  .table-wrap {
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--bg2);
  }

  table { width: 100%; border-collapse: collapse; font-size: 13px; }

  thead th {
    padding: 10px 14px;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text3);
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: rgba(255,255,255,0.02); }

  td { padding: 12px 14px; vertical-align: top; }

  .col-class  { width: 110px; }
  .col-skill  { width: 120px; }
  .col-desc   { min-width: 200px; }
  .col-stats  { width: 260px; }

  /* Badge */
  .cls-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .tag-warrior  { background: rgba(123,110,246,0.15); color: #a89cf7; border: 1px solid rgba(123,110,246,0.3); }
  .tag-archer   { background: rgba(29,158,117,0.12);  color: #5DCAA5; border: 1px solid rgba(29,158,117,0.25); }
  .tag-mage     { background: rgba(55,138,221,0.12);  color: #85B7EB; border: 1px solid rgba(55,138,221,0.25); }
  .tag-healer   { background: rgba(99,153,34,0.12);   color: #97C459; border: 1px solid rgba(99,153,34,0.25); }
  .tag-bard     { background: rgba(186,117,23,0.12);  color: #EF9F27; border: 1px solid rgba(186,117,23,0.25); }
  .tag-rogue    { background: rgba(216,90,48,0.12);   color: #F0997B; border: 1px solid rgba(216,90,48,0.25); }

  /* Skill name */
  .skill-name {
    font-weight: 600;
    color: var(--text);
    font-size: 13px;
    line-height: 1.4;
  }
  .skill-cat-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 5px;
    vertical-align: middle;
    position: relative; top: -1px;
  }

  /* Description */
  .skill-desc {
    color: var(--text2);
    font-size: 12.5px;
    line-height: 1.65;
  }

  /* Stats list */
  .stat-list { list-style: none; }
  .stat-list li {
    display: flex;
    gap: 8px;
    font-size: 12px;
    line-height: 1.7;
    align-items: baseline;
  }
  .stat-key {
    color: var(--text3);
    white-space: nowrap;
    min-width: 110px;
    font-size: 11px;
  }
  .stat-val {
    color: var(--accent2);
    font-weight: 600;
  }

  /* No results */
  .no-result {
    text-align: center;
    padding: 40px;
    color: var(--text3);
    font-size: 14px;
  }

  /* Category color accents per row */
  .cat-warrior td:first-child { border-left: 2px solid rgba(123,110,246,0.5); }
  .cat-archer  td:first-child { border-left: 2px solid rgba(29,158,117,0.5); }
  .cat-mage    td:first-child { border-left: 2px solid rgba(55,138,221,0.5); }
  .cat-healer  td:first-child { border-left: 2px solid rgba(99,153,34,0.5); }
  .cat-bard    td:first-child { border-left: 2px solid rgba(186,117,23,0.5); }
  .cat-rogue   td:first-child { border-left: 2px solid rgba(216,90,48,0.5); }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 36px;
    font-size: 11px;
    color: var(--text3);
  }

  /* Responsive */
  @media (max-width: 700px) {
    .col-stats { display: none; }
    .col-class { width: 80px; }
    .col-skill { width: 90px; }
    thead th.col-stats { display: none; }
  }
</style>
</head>

    cat: 'rogue', cls: '듀얼블레이드', skill: '교차하는 검격',
    desc: '십자 베기 공격 시 균열 발생, 주변 적 범위 피해',
    stats: [['범위 대미지','4'],['범위','3.5m'],['발동 스킬','스플릿 슬래시/다운, 하울링 게일/템페스트, 크로스 스트라이크, 파이널 히트']]
  },
];

let currentCat = 'all';

function render() {
  const rows = currentCat === 'all' ? data : data.filter(d => d.cat === currentCat);
  document.getElementById('count-display').textContent = rows.length;

  if (rows.length === 0) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="4"><div class="no-result">해당 계열 직업이 없습니다</div></td></tr>';
    return;
  }

  document.getElementById('tbody').innerHTML = rows.map(d => {
    const c = CATS[d.cat];
    return `
      <tr class="cat-${d.cat}">
        <td class="col-class">
          <span class="cls-badge ${c.badge}">${d.cls}</span>
        </td>
        <td class="col-skill">
          <div class="skill-name">
            <span class="skill-cat-dot" style="background:${c.dot}"></span>${d.skill}
          </div>
        </td>
        <td class="col-desc">
          <div class="skill-desc">${d.desc}</div>
        </td>
        <td class="col-stats">
          <ul class="stat-list">
            ${d.stats.map(([k,v]) => `
              <li>
                <span class="stat-key">${k}</span>
                <span class="stat-val">${v}</span>
              </li>`).join('')}
          </ul>
        </td>
      </tr>`;
  }).join('');
}

function filter(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  render();
}

render();
</script>
</body>
</html>
